name: Build & Push Backend

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: self-hosted

        permissions:
            packages: write
            contents: read

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Generate prisma client
              run: npm run prisma:generate

            - name: Build application
              run: npm run build

            - name: Start application for API client generation
              run: |
                  npm run start:prod &
                  sleep 10

            - name: Generate API client
              run: |
                  node scripts/generate-api-client.cjs
                  cd api-client
                  npm install
                  npm run build

            - name: Publish API client to npm
              if: success()
              run: |
                  cd api-client
                  echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
                  npm publish --access public

            - name: Stop application
              run: pkill -f "node dist/main" || true

            - name: Login to GHCR
              run:
                  echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor
                  }} --password-stdin

            - name: Build image
              run: |
                  docker build -t ghcr.io/${{ github.repository_owner }}/laundry-app-be:latest .

            - name: Push image
              run: |
                  docker push ghcr.io/${{ github.repository_owner }}/laundry-app-be:latest
    deploy:
        needs: build
        runs-on: self-hosted

        steps:
            - uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      cd /app
                      docker compose down
                      docker compose pull
                      docker compose up -d
